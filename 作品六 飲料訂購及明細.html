<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表單 - 飲料訂購及明細</title>  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      padding: 30px 16px;
    }

    .container {
      width: 100%;
      max-width: 780px;
    }

    /* 標題區 */
    .header {
      background: #2e7d52;
      border-radius: 16px;
      text-align: center;
      padding: 30px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 2.4rem;
      font-weight: bold;
      color: #1a1a1a;
      letter-spacing: 4px;
    }

    /* 表單區塊 */
    .form-group {
      margin-bottom: 14px;
    }

    label.field-label {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 4px;
      color: #333;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
      background: white;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    select:focus,
    textarea:focus {
      border-color: #4a90e2;
      box-shadow: 0 0 0 2px rgba(74,144,226,0.2);
    }

    /* placeholder 顏色 */
    ::placeholder { color: #aaa; }

    /* 下拉選單：無效選擇時紅框 */
    select.invalid {
      border-color: #e53935;
    }
    .error-msg {
      color: #e53935;
      font-size: 0.85rem;
      margin-top: 3px;
    }

    /* 單選配料 */
    .topping-label {
      display: block;
      font-size: 0.95rem;
      color: #333;
      margin-bottom: 6px;
    }
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    /* 滑桿 */
    .slider-label {
      font-size: 0.95rem;
      color: #333;
      margin-bottom: 6px;
    }
    .slider-label span {
      font-weight: bold;
      font-size: 1.1rem;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #3b82f6;
      cursor: pointer;
    }

    /* 單價 / 配料顯示 */
    .price-info {
      font-size: 1rem;
      color: #333;
      margin: 10px 0 14px;
    }
    .price-info .unit-price {
      font-weight: bold;
      font-size: 1.2rem;
      color: #f59e0b;
    }
    .price-info .topping-price {
      font-weight: bold;
      font-size: 1.2rem;
      color: #ef4444;
    }

    /* 總價 */
    .total-price {
      color: #e53935;
      font-size: 1.1rem;
      font-weight: bold;
      margin: 10px 0 20px;
    }
    .total-price span {
      font-size: 1.4rem;
    }

    /* 按鈕區 */
    .btn-group {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    button {
      padding: 10px 36px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }

    .btn-cancel {
      background: #9e9e9e;
      color: white;
    }
    .btn-submit {
      background: #1565c0;
      color: white;
    }

    /* ── 飲料訂購明細 ── */
    .detail-section {
      margin-top: 30px;
      display: none; /* 預設隱藏，送出後顯示 */
    }
    .detail-header {
      background: #f5a623;
      border-radius: 14px;
      text-align: center;
      padding: 28px;
      margin-bottom: 12px;
    }
    .detail-header h2 {
      font-size: 2.2rem;
      font-weight: bold;
      color: #1a1a1a;
      letter-spacing: 4px;
    }
    .detail-card {
      background: white;
      border-radius: 10px;
      padding: 18px 22px;
      margin-bottom: 10px;
      font-size: 1rem;
      color: #222;
      line-height: 1.8;
      border: 1px solid #e0e0e0;
    }
    .detail-card p { margin: 4px 0; }
    .detail-card .label { color: #555; }
    .detail-card .value { font-weight: bold; }
    .detail-total {
      color: #e53935;
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 6px;
    }
    .detail-total span { font-size: 1.5rem; }
  </style>
</head>
<body>
<div class="container">

  <!-- 標題 -->
  <div class="header">
    <h1>飲料訂購</h1>
  </div>

  <!-- 訂購者名稱 -->
  <div class="form-group">
    <input type="text" id="customerName" placeholder="訂購者名稱(2-5字)"
           minlength="2" maxlength="5">
  </div>

  <!-- 產品名稱 -->
  <div class="form-group">
    <label class="field-label">產品名稱</label>
    <input type="text" id="productName" placeholder="字數2~6字"
           minlength="2" maxlength="6">
  </div>

  <!-- 請選擇冰塊 -->
  <div class="form-group">
    <select id="iceLevel" class="invalid" onchange="validateIce()">
      <option value="">---請選擇冰塊---</option>
      <option value="正常冰">正常冰</option>
      <option value="少冰">少冰</option>
      <option value="微冰">微冰</option>
      <option value="去冰">去冰</option>
      <option value="熱飲">熱飲</option>
    </select>
    <div class="error-msg" id="iceError">請選擇冰度</div>
  </div>

  <!-- 單點配料 -->
  <div class="form-group">
    <span class="topping-label">單點配料:</span>
    <div class="checkbox-group">
      <label><input type="checkbox" value="粉圓" onchange="updateToppingPrice()"> 粉圓</label>
      <label><input type="checkbox" value="QQ"   onchange="updateToppingPrice()"> QQ</label>
      <label><input type="checkbox" value="紅豆" onchange="updateToppingPrice()"> 紅豆</label>
      <label><input type="checkbox" value="綠豆" onchange="updateToppingPrice()"> 綠豆</label>
    </div>
  </div>

  <!-- 數量滑桿 -->
  <div class="form-group">
    <div class="slider-label">數量: <span id="qtyDisplay">1</span> 杯</div>
    <input type="range" id="qtySlider" min="1" max="10" value="1"
           oninput="updateQty()">
  </div>

  <!-- 單價 & 配料顯示 -->
  <div class="price-info">
    單價: <span class="unit-price">50</span> 元 &nbsp; 配料:
    <span class="topping-price" id="toppingDisplay">XX</span>元
  </div>

  <!-- 第二滑桿（裝飾用，對應單價調整） -->
  <div class="form-group">
    <input type="range" id="priceSlider" min="30" max="150" value="50"
           oninput="updateUnitPrice()">
  </div>

  <!-- 備註 -->
  <div class="form-group">
    <textarea id="remark" rows="3" placeholder="備註(2-10字)"
              minlength="2" maxlength="10"></textarea>
  </div>

  <!-- 總價 -->
  <div class="total-price">總價: <span id="totalDisplay">50</span>元</div>

  <!-- 按鈕 -->
  <div class="btn-group">
    <button class="btn-cancel" onclick="cancelForm()">取消</button>
    <button class="btn-submit" onclick="submitForm()">送出</button>
  </div>

  <!-- 飲料訂購明細（送出後顯示） -->
  <div class="detail-section" id="detailSection">
    <div class="detail-header">
      <h2>飲料訂購明細</h2>
    </div>
    <div class="detail-card">
      <p><span class="label">產品名稱: </span><span class="value" id="d-product">XXXXXX</span></p>
    </div>
    <div class="detail-card">
      <p><span class="label">訂購者: </span><span class="value" id="d-name"></span></p>
      <p><span class="label">冰塊: </span><span class="value" id="d-ice"></span></p>
      <p><span class="label">配料: </span><span class="value" id="d-toppings"></span></p>
      <p><span class="label">數量: </span><span class="value" id="d-qty"></span> 杯</p>
      <p><span class="label">單價: </span><span class="value" id="d-unitprice"></span> 元</p>
      <p><span class="label">配料費: </span><span class="value" id="d-toppingfee"></span> 元</p>
      <p><span class="label">備註: </span><span class="value" id="d-remark">無</span></p>
      <div class="detail-total">總價: <span id="d-total"></span>元</div>
    </div>
  </div>

</div>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/jquery-4.0.0.min.js"></script>

<script>
  // ─── 配料單價表 ───────────────────────────────
  const TOPPING_PRICES = { 粉圓: 10, QQ: 10, 紅豆: 10, 綠豆: 10 };
  const UNIT_PRICE_BASE = 50;

  let unitPrice = UNIT_PRICE_BASE;
  let qty = 1;
  let toppingTotal = 0;

  // 冰塊驗證
  function validateIce() {
    const sel = document.getElementById('iceLevel');
    const err = document.getElementById('iceError');
    if (sel.value === '') {
      sel.classList.add('invalid');
      err.style.display = 'block';
    } else {
      sel.classList.remove('invalid');
      err.style.display = 'none';
    }
    updateTotal();
  }

  // 數量滑桿
  function updateQty() {
    qty = parseInt(document.getElementById('qtySlider').value);
    document.getElementById('qtyDisplay').textContent = qty;
    updateTotal();
  }

  // 單價滑桿
  function updateUnitPrice() {
    unitPrice = parseInt(document.getElementById('priceSlider').value);
    document.querySelector('.unit-price').textContent = unitPrice;
    updateTotal();
  }

  // 配料勾選
  function updateToppingPrice() {
    const checked = document.querySelectorAll('.checkbox-group input:checked');
    toppingTotal = 0;
    checked.forEach(cb => {
      toppingTotal += TOPPING_PRICES[cb.value] || 0;
    });
    const display = document.getElementById('toppingDisplay');
    display.textContent = toppingTotal === 0 ? 'XX' : toppingTotal;
    updateTotal();
  }

  // 更新總價
  function updateTotal() {
    const total = (unitPrice + toppingTotal) * qty;
    document.getElementById('totalDisplay').textContent = total;
  }

  // 取消
  function cancelForm() {
    document.getElementById('customerName').value = '';
    document.getElementById('productName').value = '';
    document.getElementById('iceLevel').value = '';
    document.getElementById('iceLevel').classList.add('invalid');
    document.getElementById('iceError').style.display = 'block';
    document.querySelectorAll('.checkbox-group input').forEach(cb => cb.checked = false);
    document.getElementById('qtySlider').value = 1;
    document.getElementById('qtyDisplay').textContent = 1;
    document.getElementById('priceSlider').value = UNIT_PRICE_BASE;
    document.querySelector('.unit-price').textContent = UNIT_PRICE_BASE;
    document.getElementById('remark').value = '';
    toppingTotal = 0;
    unitPrice = UNIT_PRICE_BASE;
    qty = 1;
    document.getElementById('toppingDisplay').textContent = 'XX';
    document.getElementById('detailSection').style.display = 'none';
    updateTotal();
  }

  // 送出
  function submitForm() {
    const name = document.getElementById('customerName').value.trim();
    const product = document.getElementById('productName').value.trim();
    const ice = document.getElementById('iceLevel').value;
    const remark = document.getElementById('remark').value.trim();

    if (name.length < 2 || name.length > 5) {
      alert('訂購者名稱需為 2~5 字！'); return;
    }
    if (product.length < 2 || product.length > 6) {
      alert('產品名稱需為 2~6 字！'); return;
    }
    if (!ice) {
      alert('請選擇冰塊！'); return;
    }
    if (remark && (remark.length < 2 || remark.length > 10)) {
      alert('備註需為 2~10 字！'); return;
    }

    const total = (unitPrice + toppingTotal) * qty;
    const toppings = [...document.querySelectorAll('.checkbox-group input:checked')]
      .map(cb => cb.value).join('、') || '無';

    // 填入明細
    document.getElementById('d-product').textContent   = product;
    document.getElementById('d-name').textContent      = name;
    document.getElementById('d-ice').textContent       = ice;
    document.getElementById('d-toppings').textContent  = toppings;
    document.getElementById('d-qty').textContent       = qty;
    document.getElementById('d-unitprice').textContent = unitPrice;
    document.getElementById('d-toppingfee').textContent= toppingTotal;
    document.getElementById('d-remark').textContent    = remark || '無';
    document.getElementById('d-total').textContent     = total;

    // 顯示明細區塊並捲動過去
    const section = document.getElementById('detailSection');
    section.style.display = 'block';
    section.scrollIntoView({ behavior: 'smooth' });
  }

  // 初始化
  updateTotal();
</script>
</body>
</html>
