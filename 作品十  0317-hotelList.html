<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅館民宿清單 | Hotel List</title>
  <link rel="stylesheet" href="bootstrap.min.css">
  <style>
    :root {
      --green-dark : #1a3a2a;
      --green-mid  : #2d6a4f;
      --green-light: #52b788;
      --green-pale : #d8f3dc;
      --orange     : #f4845f;
      --cream      : #fefae0;
      --text-main  : #1a1a1a;
      --text-muted : #6c757d;
      --radius     : 12px;
    }

    body {
      background: #f5f7f4;
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      color: var(--text-main);
    }

    .page-header {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
      color: #fff;
      padding: 2rem 1.5rem 1.5rem;
      border-radius: 0 0 24px 24px;
      margin-bottom: 1.5rem;
    }
    .page-header h1 { font-size: 1.6rem; font-weight: 700; margin: 0; }
    .page-header p  { font-size: .85rem; opacity: .75; margin: .25rem 0 0; }

    .stat-card {
      border-radius: var(--radius);
      padding: .75rem 1.1rem;
      font-size: .85rem;
      font-weight: 600;
      border: none;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    .stat-card .num { font-size: 1.5rem; font-weight: 800; display: block; line-height:1; }

    .filter-bar {
      background: #fff;
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      margin-bottom: 1.2rem;
    }
    .filter-bar .form-control,
    .filter-bar .form-select {
      border-radius: 8px;
      border: 1.5px solid #dee2e6;
      font-size: .875rem;
    }
    .filter-bar .form-control:focus,
    .filter-bar .form-select:focus {
      border-color: var(--green-light);
      box-shadow: 0 0 0 3px rgba(82,183,136,.15);
    }

    .form-select:disabled {
      background-color: #f8f9fa;
      opacity: 0.6;
      cursor: not-allowed;
    }
    .select-hint {
      font-size: .72rem;
      color: var(--text-muted);
      margin-top: 3px;
      display: block;
    }

    #loadingBar {
      display: none;
      height: 4px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--green-light), var(--orange));
      animation: loadPulse 1.2s ease-in-out infinite;
      margin-bottom: 1rem;
    }
    @keyframes loadPulse { 0%,100%{opacity:.4} 50%{opacity:1} }

    .table-wrap {
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
    }

    #foodTable { margin: 0; font-size: .875rem; }
    #foodTable thead th {
      background: var(--green-dark);
      color: #fff;
      font-weight: 600;
      letter-spacing: .03em;
      padding: .85rem .9rem;
      white-space: nowrap;
      border: none;
    }
    #foodTable tbody tr {
      transition: background .15s;
      border-bottom: 1px solid #f0f0f0;
    }
    #foodTable tbody tr:last-child { border-bottom: none; }
    #foodTable tbody tr:hover { background: var(--green-pale) !important; }
    #foodTable td { padding: .75rem .9rem; vertical-align: middle; border: none; }

    tr.row-clean   { background: #fff; }
    tr.row-fixed   { background: #fffbea; }
    tr.row-missing { background: #fff5f5; }

    .hotel-img {
      width: 72px; height: 56px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }
    .no-img {
      width: 72px; height: 56px;
      background: #f0f4f1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: #aaa;
    }

    .hotel-name  { font-weight: 700; font-size: .95rem; }
    .hotel-id    { font-size: .72rem; color: var(--text-muted); margin-top: 2px; }
    .hotel-org   { font-size: .75rem; color: var(--green-mid); margin-top: 2px; }

    .badge-city {
      background: var(--green-mid);
      color: #fff;
      font-size: .72rem;
      padding: .25em .6em;
      border-radius: 20px;
      display: inline-block;
    }
    .badge-town {
      font-size: .72rem;
      color: var(--text-muted);
      margin-left: 4px;
    }

    .price-tag {
      font-size: .78rem;
      color: var(--green-mid);
      font-weight: 600;
    }
    .price-sep { color: #ccc; margin: 0 2px; }

    .q-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .75rem; font-weight: 600;
      padding: .3em .75em; border-radius: 20px;
      white-space: nowrap;
    }
    .q-clean   { background: #d1fae5; color: #065f46; }
    .q-fixed   { background: #fef9c3; color: #713f12; }
    .q-missing { background: #fee2e2; color: #991b1b; }

    .missing-val { color: #ccc; font-style: italic; font-size: .82rem; }

    .table-footer {
      padding: .6rem 1rem;
      font-size: .8rem;
      color: var(--text-muted);
      border-top: 1px solid #f0f0f0;
      background: #fafafa;
    }

    .legend { font-size: .78rem; }

    th[data-sort] { cursor: pointer; user-select: none; }
    th[data-sort]:hover { background: #223d30; }
    th[data-sort]::after { content: ' ⇅'; opacity: .45; }
    th[data-sort].asc::after  { content: ' ↑'; opacity: 1; }
    th[data-sort].desc::after { content: ' ↓'; opacity: 1; }

    /* 價格範圍標籤 */
    .badge-class {
      font-size: .68rem;
      background: #e8f5e9;
      color: var(--green-mid);
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 4px;
    }
  </style>
</head>
<body>

<div class="page-header">
  <div class="container-fluid">
    <h1>🏨 旅館民宿清單資料處理</h1>
    <p>AJAX 抓取 HotelList.json → Normalize 清洗 → Table 呈現</p>
  </div>
</div>

<div class="container-fluid px-3 px-md-4">

  <!-- 統計卡片 -->
  <div class="row g-2 mb-3">
    <div class="col-6 col-md-3">
      <div class="stat-card" style="background:#e8f5e9;color:#1b5e20">
        <span class="num" id="statTotal">—</span>原始總筆數
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card" style="background:#d1fae5;color:#065f46">
        <span class="num" id="statValid">—</span>清洗後有效
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card" style="background:#fee2e2;color:#991b1b">
        <span class="num" id="statDrop">—</span>被排除筆數
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card" style="background:#fef9c3;color:#713f12">
        <span class="num" id="statFixed">—</span>欄位修正次數
      </div>
    </div>
  </div>

  <!-- 篩選列 -->
  <div class="filter-bar">
    <div class="row g-2 align-items-start">
      <div class="col-12 col-md-3">
        <input type="text" id="searchInput" class="form-control"
               placeholder="🔍 搜尋名稱 / 地址 / 城市...">
      </div>
      <div class="col-6 col-md-2">
        <select id="citySelect" class="form-select">
          <option value="">🏙️ 全部城市</option>
        </select>
      </div>
      <div class="col-6 col-md-2">
        <select id="townSelect" class="form-select" disabled>
          <option value="">🗺️ 全部鄉鎮市</option>
        </select>
        <span class="select-hint" id="townHint">請先選擇城市</span>
      </div>
      <div class="col-6 col-md-3">
        <select id="qualitySelect" class="form-select">
          <option value="">📊 全部品質</option>
          <option value="clean">✅ 完整無缺</option>
          <option value="fixed">🔧 有修正欄位</option>
          <option value="missing">⚠️ 有缺漏欄位</option>
        </select>
      </div>
      <div class="col-6 col-md-2">
        <button class="btn btn-outline-secondary w-100" onclick="resetFilter()">重置篩選</button>
      </div>
    </div>
  </div>

  <!-- 進度條 -->
  <div id="loadingBar"></div>

  <!-- 圖例 -->
  <div class="d-flex gap-3 mb-2 flex-wrap legend">
    <span><span class="q-badge q-clean">✅ 完整</span> 所有欄位正常</span>
    <span><span class="q-badge q-fixed">🔧 已修正</span> 清洗前有問題但已修正</span>
    <span><span class="q-badge q-missing">⚠️ 缺漏</span> 清洗後仍有空欄位</span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-responsive">
      <table class="table" id="foodTable">
        <thead>
          <tr>
            <th style="width:40px">#</th>
            <th style="width:80px">圖片</th>
            <th data-sort="name">名稱</th>
            <th data-sort="city">城市／鄉鎮</th>
            <th data-sort="address">地址</th>
            <th data-sort="tel">電話</th>
            <th data-sort="price">價格範圍</th>
            <th>資料品質</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="8" class="text-center py-5 text-muted">
              ⏳ 資料載入中...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="table-footer d-flex justify-content-between align-items-center">
      <span id="showCountMsg">—</span>
      <span id="dropMsg" class="text-danger"></span>
    </div>
  </div>

</div><!-- /container -->

<script src="jquery-4.0.0.min.js"></script>
<script src="bootstrap.bundle.min.js"></script>
<script>
'use strict';

/* ════════════════════════════════════════════════
   STEP 1：AJAX 抓取 HotelList.json
   ✅ 修正：url 改為相對路徑，移除錯誤的 script/link 引用
════════════════════════════════════════════════ */
function fetchHotelList() {           // ✅ 修正：函式名稱統一為 fetchHotelList
  $('#loadingBar').show();

  $.ajax({
    url     : 'HotelList.json',       // ✅ 修正：指向本地 JSON 檔案
    type    : 'GET',
    dataType: 'json',
    timeout : 8000,

    success: function (data) {
      $('#loadingBar').hide();

      /*
       * ✅ 修正：政府 JSON 頂層結構為 { Hotels: [...] }
       * 依序嘗試各種可能的結構取得陣列
       */
      const raw =
        (data.Hotels)                  ? data.Hotels          :   // 政府標準格式
        (Array.isArray(data))          ? data                  :   // 直接陣列
        (data.XML?.Restaurant)         ? data.XML.Restaurant   :
        (data.data)                    ? data.data             :
        (data.result?.records)         ? data.result.records   : [];

      if (raw.length === 0) {
        console.warn('⚠️ 解析後資料為空，請確認 JSON 結構');
      }
      processData(raw);
    },

    error: function (xhr, status, err) {
      $('#loadingBar').hide();
      console.warn('AJAX 失敗，改用內建模擬資料。原因:', status, err);
      processData(MOCK_DATA);
    }
  });
}

/* ════════════════════════════════════════════════
   內建模擬資料（符合政府 JSON 真實欄位格式）
   ✅ 修正：欄位名稱改為 HotelID / HotelName / PostalAddress 等
════════════════════════════════════════════════ */
const MOCK_DATA = [
  {
    HotelID: 'Hotel_Mock_001',
    HotelName: '模擬思源居民宿',
    HotelLicenseNumber: '南投縣民宿358號',
    PostalAddress: { City: 'Nantou County', Town: 'Puli Township',
      StreetAddress: 'No.1, Shuitou Rd., Puli Township' },
    Telephones: [{ Tel: '(049)2927101' }],
    Images: [],
    Organizations: [{ Name: '思源居民宿', Class: 'Operator' }],
    LowestPrice: 2200, CeilingPrice: 3600,
    HotelClasses: [4], ServiceStatus: 1
  },
  {
    HotelID: 'Hotel_Mock_002',
    HotelName: '模擬凱旋新宿商旅',
    HotelLicenseNumber: '臺東縣旅館103號',
    PostalAddress: { City: 'Taitung County', Town: 'Taitung City',
      StreetAddress: 'No.243, Fujian Rd., Taitung City' },
    Telephones: [{ Tel: '(089)311777' }],
    Images: [{ URL: 'https://picsum.photos/seed/hotel002/300/200' }],
    Organizations: [{ Name: '凱旋新宿商旅股份有限公司', Class: 'Operator' }],
    LowestPrice: 1800, CeilingPrice: 4500,
    HotelClasses: [3], ServiceStatus: 1
  },
  {
    HotelID: 'Hotel_Mock_003',
    HotelName: null,                   // 模擬名稱空白 → 應被排除
    PostalAddress: { City: 'Taipei City', Town: 'Zhongzheng District', StreetAddress: '' },
    Telephones: [],
    Images: [],
    Organizations: [],
    LowestPrice: 0, CeilingPrice: 0,
    HotelClasses: [], ServiceStatus: 0
  },
  {
    HotelID: 'Hotel_Mock_004',
    HotelName: '模擬花蓮海岸民宿',
    PostalAddress: { City: 'Hualien County', Town: 'Hualien City',
      StreetAddress: 'No.10, Meilun 1st Rd.' },
    Telephones: [],                    // 無電話 → missing
    Images: [],
    Organizations: [{ Name: '花蓮海岸民宿', Class: 'Operator' }],
    LowestPrice: 3000, CeilingPrice: 5000,
    HotelClasses: [4], ServiceStatus: 1
  }
];

/* ════════════════════════════════════════════════
   STEP 2 & 3：Normalize 工具函式
   ✅ 修正：對應政府 JSON 真實欄位結構
════════════════════════════════════════════════ */

/** 安全 trim */
function norm(val) {
  if (val === null || val === undefined) return '';
  return String(val).trim();
}

/**
 * ✅ 修正：從 PostalAddress 物件取得城市/鄉鎮/地址
 * 結構：{ City, Town, ZipCode, StreetAddress }
 */
function extractAddress(item) {
  const pa = item.PostalAddress || {};
  return {
    city   : norm(pa.City),
    town   : norm(pa.Town),
    address: norm(pa.StreetAddress)
  };
}

/**
 * ✅ 修正：從 Telephones 陣列取出第一筆電話
 * 結構：[ { Tel: "..." }, ... ]
 */
function extractTel(item) {
  const tels = item.Telephones;
  if (!Array.isArray(tels) || tels.length === 0) return '';
  const raw = norm(tels[0].Tel);
  // 移除 TEL: 前綴等雜訊
  return raw.replace(/^TEL[:\s]*/i, '').trim();
}

/**
 * ✅ 修正：從 Images 陣列取出第一張圖
 * 結構：[ { URL: "..." }, ... ]
 */
function extractImage(item) {
  const imgs = item.Images;
  if (!Array.isArray(imgs) || imgs.length === 0) return '';
  const url = norm(imgs[0].URL || imgs[0].Url || imgs[0].url || '');
  return url.startsWith('http') ? url : '';
}

/**
 * ✅ 修正：從 Organizations 陣列取出營運者中文名稱
 * 結構：[ { Name, Class: "Operator" }, ... ]
 */
function extractOrgName(item) {
  const orgs = item.Organizations;
  if (!Array.isArray(orgs) || orgs.length === 0) return '';
  const op = orgs.find(o => o.Class === 'Operator') || orgs[0];
  return norm(op.Name);
}

/** 價格格式化 */
function formatPrice(low, ceil) {
  const l = parseInt(low)  || 0;
  const c = parseInt(ceil) || 0;
  if (!l && !c) return '';
  if (l === c)  return `NT$ ${l.toLocaleString()}`;
  return `NT$ ${l.toLocaleString()} ~ ${c.toLocaleString()}`;
}

/* ── 主清洗函式 ──────────────────────────────── */
function normalizeData(rawList) {
  const dropped   = [];
  let fixedCount  = 0;
  const seenIDs   = new Set();

  const mapped = rawList.map(function (item) {
    let fix = 0;

    // ✅ 修正：從巢狀欄位提取資料
    const { city, town, address } = extractAddress(item);
    const tel     = extractTel(item);
    const picURL  = extractImage(item);
    const orgName = extractOrgName(item);
    const name    = norm(item.HotelName);               // ✅ HotelName
    const id      = norm(item.HotelID) || '—';          // ✅ HotelID
    const license = norm(item.HotelLicenseNumber) || ''; // ✅ HotelLicenseNumber
    const price   = formatPrice(item.LowestPrice, item.CeilingPrice);

    // 品質判定
    const missingCount = [name, address, tel].filter(v => !v).length;
    let quality = 'clean';
    if (fix > 0)          quality = 'fixed';
    if (missingCount > 0) quality = 'missing';

    fixedCount += fix;

    return { id, name, city, town, address, tel, picURL, orgName,
             license, price, quality, _missing: missingCount };
  });

  const cleaned = mapped.filter(function (item) {
    // 排除：名稱空白
    if (!item.name) {
      dropped.push({ id: item.id, name: '（空）', reason: '名稱 HotelName 空白或 null' });
      return false;
    }
    // 排除：重複 HotelID
    if (seenIDs.has(item.id)) {
      dropped.push({ id: item.id, name: item.name, reason: '重複 HotelID' });
      return false;
    }
    seenIDs.add(item.id);
    return true;
  });

  return { cleaned, dropped, fixedCount };
}

/* ════════════════════════════════════════════════
   STEP 4：Table 佈局排版
════════════════════════════════════════════════ */
let ALL_DATA  = [];
let SORT_COL  = '';
let SORT_DIR  = 'asc';
let CITY_TOWN_MAP = {};

function missingCell(label) {
  return `<span class="missing-val">— ${label}未提供</span>`;
}

const Q_BADGE = {
  clean  : `<span class="q-badge q-clean">✅ 完整</span>`,
  fixed  : `<span class="q-badge q-fixed">🔧 已修正</span>`,
  missing: `<span class="q-badge q-missing">⚠️ 缺漏</span>`
};
const ROW_CLASS = { clean:'row-clean', fixed:'row-fixed', missing:'row-missing' };

function renderTable(data) {
  const tbody = $('#tableBody').empty();

  if (data.length === 0) {
    tbody.html(`<tr><td colspan="8" class="text-center py-5 text-muted">
                  😕 沒有符合的資料</td></tr>`);
    $('#showCountMsg').text('');
    return;
  }

  data.forEach(function (item, idx) {
    const imgTag = item.picURL
      ? `<img src="${item.picURL}" class="hotel-img"
             onerror="this.outerHTML='<div class=no-img>🏨</div>'">`
      : `<div class="no-img">🏨</div>`;

    const cityCell = item.city
      ? `<span class="badge-city">${item.city}</span>
         <span class="badge-town">${item.town}</span>`
      : missingCell('城市');

    // 顯示中文機構名稱（若有）
    const nameExtra = item.orgName
      ? `<div class="hotel-org">🏢 ${item.orgName}</div>` : '';

    const licenseExtra = item.license
      ? `<div class="hotel-id">${item.license}</div>` : '';

    const addrCell  = item.address || missingCell('地址');
    const telCell   = item.tel     || missingCell('電話');
    const priceCell = item.price
      ? `<span class="price-tag">${item.price}</span>`
      : missingCell('價格');

    tbody.append(`
      <tr class="${ROW_CLASS[item.quality]}">
        <td class="text-muted" style="font-size:.8rem">${idx + 1}</td>
        <td>${imgTag}</td>
        <td>
          <div class="hotel-name">${item.name}</div>
          ${licenseExtra}
          ${nameExtra}
        </td>
        <td>${cityCell}</td>
        <td>${addrCell}</td>
        <td>${telCell}</td>
        <td>${priceCell}</td>
        <td>${Q_BADGE[item.quality]}</td>
      </tr>`);
  });

  $('#showCountMsg').text(`顯示 ${data.length} 筆，共 ${ALL_DATA.length} 筆有效資料`);
}

/* ── 篩選邏輯 ──────────────────────────────── */
function applyFilter() {
  const kw      = $('#searchInput').val().trim().toLowerCase();
  const city    = $('#citySelect').val();
  const town    = $('#townSelect').val();
  const quality = $('#qualitySelect').val();

  let result = ALL_DATA.filter(function (item) {
    const matchKw = !kw
      || item.name.toLowerCase().includes(kw)
      || item.address.toLowerCase().includes(kw)
      || item.city.toLowerCase().includes(kw)
      || (item.orgName && item.orgName.toLowerCase().includes(kw));
    const matchCity    = !city    || item.city === city;
    const matchTown    = !town    || item.town === town;
    const matchQuality = !quality || item.quality === quality;
    return matchKw && matchCity && matchTown && matchQuality;
  });

  if (SORT_COL) {
    result = result.slice().sort(function (a, b) {
      const va = a[SORT_COL] || '';
      const vb = b[SORT_COL] || '';
      return SORT_DIR === 'asc'
        ? va.localeCompare(vb, 'zh-TW')
        : vb.localeCompare(va, 'zh-TW');
    });
  }

  renderTable(result);
}

function resetFilter() {
  $('#searchInput').val('');
  $('#citySelect').val('');
  resetTownDropdown();
  $('#qualitySelect').val('');
  SORT_COL = ''; SORT_DIR = 'asc';
  $('th[data-sort]').removeClass('asc desc');
  applyFilter();
}

function resetTownDropdown() {
  $('#townSelect').prop('disabled', true)
                  .html('<option value="">🗺️ 全部鄉鎮市</option>');
  $('#townHint').text('請先選擇城市');
}

function onCityChange() {
  const city  = $('#citySelect').val();
  const $town = $('#townSelect');

  if (!city) { resetTownDropdown(); applyFilter(); return; }

  const towns = CITY_TOWN_MAP[city] || [];
  $town.html('<option value="">🗺️ 全部鄉鎮市</option>');
  towns.forEach(t => $town.append(`<option value="${t}">${t}</option>`));

  if (towns.length > 0) {
    $town.prop('disabled', false);
    $('#townHint').text(`共 ${towns.length} 個鄉鎮市`);
  } else {
    $town.prop('disabled', true);
    $('#townHint').text('此城市無鄉鎮資料');
  }
  applyFilter();
}

/* ── 建立城市 & 鄉鎮下拉 ─────────────────── */
function buildLocationDropdowns(data) {
  CITY_TOWN_MAP = {};
  data.forEach(function (item) {
    if (!item.city) return;
    if (!CITY_TOWN_MAP[item.city]) CITY_TOWN_MAP[item.city] = new Set();
    if (item.town) CITY_TOWN_MAP[item.city].add(item.town);
  });
  Object.keys(CITY_TOWN_MAP).forEach(c => {
    CITY_TOWN_MAP[c] = [...CITY_TOWN_MAP[c]].sort((a,b) => a.localeCompare(b,'zh-TW'));
  });
  const cities = Object.keys(CITY_TOWN_MAP).sort((a,b) => a.localeCompare(b,'zh-TW'));
  const $city  = $('#citySelect');
  cities.forEach(c => $city.append(`<option value="${c}">${c}</option>`));
}

/* ── 欄位排序 ──────────────────────────────── */
$(document).on('click', 'th[data-sort]', function () {
  const col = $(this).data('sort');
  SORT_DIR  = (SORT_COL === col && SORT_DIR === 'asc') ? 'desc' : 'asc';
  SORT_COL  = col;
  $('th[data-sort]').removeClass('asc desc');
  $(this).addClass(SORT_DIR);
  applyFilter();
});

/* ════════════════════════════════════════════════
   主流程：清洗 → 統計 → 渲染
════════════════════════════════════════════════ */
function processData(rawList) {
  const { cleaned, dropped, fixedCount } = normalizeData(rawList);
  ALL_DATA = cleaned;

  $('#statTotal').text(rawList.length);
  $('#statValid').text(cleaned.length);
  $('#statDrop').text(dropped.length);
  $('#statFixed').text(fixedCount);
  $('#dropMsg').text(
    dropped.length > 0
      ? `已排除 ${dropped.length} 筆（名稱空白或重複）`
      : ''
  );

  buildLocationDropdowns(cleaned);

  // 事件綁定（只綁一次）
  $('#searchInput').off('input').on('input', applyFilter);
  $('#citySelect').off('change').on('change', onCityChange);
  $('#townSelect').off('change').on('change', applyFilter);
  $('#qualitySelect').off('change').on('change', applyFilter);

  renderTable(cleaned);

  // Console 輸出供偵錯
  console.group('✅ 清洗後資料');
  console.table(cleaned.map(d => ({
    id: d.id, name: d.name, city: d.city, town: d.town,
    address: d.address, tel: d.tel, price: d.price, quality: d.quality
  })));
  console.groupEnd();

  if (dropped.length) {
    console.group('❌ 被排除資料');
    console.table(dropped);
    console.groupEnd();
  }
}

/* ════════════════════════════════════════════════
   ✅ 修正：啟動函式名稱改為 fetchHotelList
   （原本錯誤呼叫 fetchFoodList 導致 ReferenceError）
════════════════════════════════════════════════ */
$(function () { fetchHotelList(); });
</script>
